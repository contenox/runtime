# CI: contenox compile smoke, Windows cross-compile smoke, and cheap TestUnit_* Go tests.
# No TestSystem_* / Docker / LLM integration tests.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install CGo dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ nlohmann-json3-dev

      - name: Fetch missing llama.cpp headers
        run: scripts/prepare_ollama_llama_headers.sh

      - name: Build contenox (compile smoke)
        run: make build-contenox

      - name: Install Windows cross-build dependencies
        run: |
          sudo apt-get install -y gcc-mingw-w64-x86-64-posix g++-mingw-w64-x86-64-posix

      - name: Build contenox for Windows (compile smoke)
        run: make build-contenox-windows

      - name: CLI help smoke
        run: make test-contenox-help

      - name: Cheap Go tests (TestUnit_* + -short only)
        run: make test-unit
