name: VS Code Marketplace

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish built VSIX artifacts to the VS Code Marketplace"
        required: true
        type: boolean
        default: false
      pre_release:
        description: "Publish as Marketplace pre-release when manually publishing"
        required: true
        type: boolean
        default: true

concurrency:
  group: vscode-marketplace-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      runtime_version: ${{ steps.version.outputs.runtime_version }}
      extension_version: ${{ steps.version.outputs.extension_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/vscode/package-lock.json

      - name: Install VS Code test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb

      - name: Install extension dependencies
        working-directory: packages/vscode
        run: npm ci

      - name: Sync extension metadata
        working-directory: packages/vscode
        run: npm run sync:metadata

      - name: Verify synced metadata is committed
        run: git diff --exit-code -- packages/vscode/package.json packages/vscode/package-lock.json packages/vscode/README.md

      - name: Read and verify versions
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RUNTIME_VERSION="$(tr -d '\r\n' < runtime/version/version.txt)"
          EXTENSION_VERSION="${RUNTIME_VERSION#v}"
          PACKAGE_VERSION="$(node -p "require('./packages/vscode/package.json').version")"
          PACKAGE_ID="$(node -p "const p=require('./packages/vscode/package.json'); p.publisher + '.' + p.name")"

          if [ "${PACKAGE_VERSION}" != "${EXTENSION_VERSION}" ]; then
            echo "package.json version ${PACKAGE_VERSION} does not match runtime version ${RUNTIME_VERSION}" >&2
            exit 1
          fi
          if [ "${PACKAGE_ID}" != "contenox.runtime" ]; then
            echo "package id ${PACKAGE_ID} is not contenox.runtime" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF}" == refs/tags/* ]] && [ "${GITHUB_REF_NAME}" != "${RUNTIME_VERSION}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match runtime/version/version.txt ${RUNTIME_VERSION}" >&2
            exit 1
          fi

          echo "runtime_version=${RUNTIME_VERSION}" >> "$GITHUB_OUTPUT"
          echo "extension_version=${EXTENSION_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Type-check extension
        working-directory: packages/vscode
        run: npm run check

      - name: Run VS Code integration tests
        working-directory: packages/vscode
        run: xvfb-run -a npm test

  build:
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
            cxx: g++
            smoke: true
          - target: linux-arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            linux_arm64_cross: true
          - target: darwin-arm64
            os: macos-15
            goos: darwin
            goarch: arm64
            cc: clang
            cxx: clang++
            smoke: true
          - target: darwin-x64
            os: macos-15-intel
            goos: darwin
            goarch: amd64
            cc: clang
            cxx: clang++
          - target: win32-x64
            os: ubuntu-latest
            goos: windows
            goarch: amd64
            cc: x86_64-w64-mingw32-gcc-posix
            cxx: x86_64-w64-mingw32-g++-posix
            windows_cross: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/vscode/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ nlohmann-json3-dev unzip file
          if [ "${{ matrix.linux_arm64_cross || false }}" = "true" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi
          if [ "${{ matrix.windows_cross || false }}" = "true" ]; then
            sudo apt-get install -y gcc-mingw-w64-x86-64-posix g++-mingw-w64-x86-64-posix
          fi

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install nlohmann-json
          NLOHMANN_PREFIX="$(brew --prefix nlohmann-json)"
          echo "CGO_CFLAGS=-I${NLOHMANN_PREFIX}/include" >> "$GITHUB_ENV"
          echo "CGO_CXXFLAGS=-I${NLOHMANN_PREFIX}/include" >> "$GITHUB_ENV"

      - name: Fetch missing llama.cpp headers
        run: scripts/prepare_ollama_llama_headers.sh

      - name: Prepare Windows cross-build includes
        if: matrix.windows_cross == true
        shell: bash
        run: |
          set -euo pipefail
          INCLUDE_DIR="$(scripts/prepare_windows_cross_includes.sh)"
          echo "CGO_CXXFLAGS=-I${INCLUDE_DIR}" >> "$GITHUB_ENV"

      - name: Install extension dependencies
        working-directory: packages/vscode
        run: npm ci

      - name: Sync metadata and compile extension
        working-directory: packages/vscode
        run: npm run sync:metadata && npm run compile

      - name: Build target Contenox binary
        working-directory: packages/vscode
        env:
          CONTENOX_VSCODE_TARGET: ${{ matrix.target }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CONTENOX_VERSION: ${{ needs.verify.outputs.runtime_version }}
        run: node scripts/build-binary.js

      - name: Inspect target binary
        working-directory: packages/vscode
        shell: bash
        run: |
          set -euo pipefail
          file bin/contenox*
          if [ "${{ matrix.smoke || false }}" = "true" ]; then
            ./bin/contenox --version
          fi

      - name: Package target VSIX
        working-directory: packages/vscode
        env:
          CONTENOX_VSCODE_TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          npx vsce package \
            --target "${{ matrix.target }}" \
            --out "artifacts/runtime-${{ matrix.target }}-${{ needs.verify.outputs.extension_version }}.vsix"

      - name: Verify target VSIX contents
        working-directory: packages/vscode
        env:
          CONTENOX_VSCODE_TARGET: ${{ matrix.target }}
        run: npm run package:check -- artifacts/*.vsix

      - name: Upload target VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vscode-${{ matrix.target }}
          path: packages/vscode/artifacts/*.vsix
          if-no-files-found: error

  publish:
    needs: [verify, build]
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == true) }}
    steps:
      - name: Download target VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vscode-*
          merge-multiple: true
          path: dist-vsix

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish target VSIX artifacts
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          PRE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.pre_release == true }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "${VSCE_PAT}"

          flags=()
          if [ "${PRE_RELEASE}" = "true" ]; then
            flags+=(--pre-release)
          fi

          for file in dist-vsix/*.vsix; do
            echo "Publishing ${file}"
            vsce publish --packagePath "${file}" "${flags[@]}" -p "${VSCE_PAT}"
          done
