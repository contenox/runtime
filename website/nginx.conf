# Static contenox.com. Listens on 3000 to match the site deployment contract
# (containerPort + readiness/liveness probes on GET /).
server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # GitHub-Pages-equivalent semantics: directory indexes, real .html redirect
    # stubs, and the 404 page (which forwards legacy URLs to the homepage).
    error_page 404 /404.html;

    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Hashed build assets are immutable.
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # The search index changes with every deploy; let it revalidate.
    location /pagefind/ {
        add_header Cache-Control "public, max-age=3600";
    }

    # install.sh must always be fresh — it resolves the latest release.
    location = /install.sh {
        default_type text/plain;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml text/plain;
    gzip_min_length 1024;
}
