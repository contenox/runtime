name: VS Code Extension CI

on:
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/vscode-extension-ci.yml"
      - "packages/vscode/**"
      - "runtime/vscodeagent/**"
      - "runtime/contenoxcli/vscodeagent_cmd.go"
      - "runtime/contenoxcli/chain-fim.json"
      - "runtime/version/version.txt"
      - "cmd/contenox/**"
      - "go.mod"
      - "go.sum"
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/vscode-extension-ci.yml"
      - "packages/vscode/**"
      - "runtime/vscodeagent/**"
      - "runtime/contenoxcli/vscodeagent_cmd.go"
      - "runtime/contenoxcli/chain-fim.json"
      - "runtime/version/version.txt"
      - "cmd/contenox/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

concurrency:
  group: vscode-extension-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/vscode/package-lock.json

      - name: Install CGo and package inspection dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ nlohmann-json3-dev unzip xvfb

      - name: Fetch missing llama.cpp headers
        run: scripts/prepare_ollama_llama_headers.sh

      - name: Install extension dependencies
        working-directory: packages/vscode
        run: npm ci

      - name: Type-check extension
        working-directory: packages/vscode
        run: npm run check

      - name: Run VS Code integration tests
        working-directory: packages/vscode
        run: xvfb-run -a npm test

      - name: Build stable VSIX
        working-directory: packages/vscode
        env:
          CONTENOX_VSCODE_TARGET: linux-x64
        run: npm run package

      - name: Verify stable VSIX contents
        working-directory: packages/vscode
        env:
          CONTENOX_VSCODE_TARGET: linux-x64
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          npm run package:check -- "artifacts/runtime-linux-x64-${VERSION}.vsix"

      - name: Smoke bundled runtime
        working-directory: packages/vscode
        run: ./bin/contenox --version

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-linux-smoke
          path: packages/vscode/artifacts/runtime-linux-x64-*.vsix
          if-no-files-found: error
