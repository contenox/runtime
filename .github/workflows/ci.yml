# CI: contenox compile smoke, Windows cross-compile smoke, and cheap TestUnit_* Go tests.
# No TestSystem_* / Docker / LLM integration tests.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # contenox is pure Go (CGO_ENABLED=0); the native inference backends live
      # in the separate modeld binary, which has its own CGo CI. No C toolchain,
      # llama.cpp headers, or MinGW cross-toolchain is needed here.
      - name: Build contenox (compile smoke)
        run: make build-contenox

      - name: Build contenox for Windows (compile smoke)
        run: make build-contenox-windows

      - name: CLI help smoke
        run: make test-contenox-help

      - name: Cheap Go tests (TestUnit_* + -short only)
        run: make test-unit
