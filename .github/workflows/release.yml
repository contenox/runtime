name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.TAG }}
      extension_version: ${{ steps.vars.outputs.EXTENSION_VERSION }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag
        id: vars
        run: |
          echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "EXTENSION_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches tag
        run: |
          TAG="${{ steps.vars.outputs.TAG }}"
          VERSION_IN_FILE=$(cat runtime/version/version.txt | tr -d '\n' | tr -d '\r')
          if [ "$VERSION_IN_FILE" != "$TAG" ]; then
            echo "ERROR: Version in file ($VERSION_IN_FILE) does NOT match tag ($TAG)"
            echo "Proper release process:"
            echo "  1. Update runtime/version/version.txt with new version"
            echo "  2. Commit the change"
            echo "  3. Create tag pointing to THAT commit"
            echo "  4. Push tag"
            exit 1
          fi
          echo "✓ Version verification passed: $VERSION_IN_FILE matches tag"

  web:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            packages/ui/package-lock.json
            packages/beam/package-lock.json

      - name: Build, test, and verify Beam UI
        run: make build-ui test-ui verify-ui-embed

      - name: Upload Beam dist
        uses: actions/upload-artifact@v4
        with:
          name: beam-dist
          path: runtime/internal/web/beam/dist

  build:
    needs: [verify, web]
    strategy:
      fail-fast: false
      matrix:
        include:
          # contenox is pure Go (CGO_ENABLED=0); every target cross-compiles from
          # one Linux runner with no C toolchain. The native inference backends
          # live in the separate modeld binary, which has its own CGo release.
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download Beam dist
        uses: actions/download-artifact@v4
        with:
          name: beam-dist
          path: runtime/internal/web/beam/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install zip (Windows packaging)
        if: matrix.goos == 'windows'
        run: sudo apt-get update -qq && sudo apt-get install -y zip

      - name: Build contenox binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          TAG="${{ needs.verify.outputs.tag }}"
          LDFLAGS="-X github.com/contenox/runtime/runtime/contenoxcli.Version=${TAG}"
          mkdir -p bin
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          go build -ldflags="${LDFLAGS}" -o "bin/contenox-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" ./cmd/contenox

      # The ACP registry consumes an archive whose `cmd` is the executable inside
      # it (see opencode/codex-acp manifests: cmd "./<name>"). Package a .tar.gz
      # holding a binary named plainly `contenox` on Unix, or a .zip holding
      # `contenox.exe` on Windows, alongside the raw binary that install.sh keeps
      # fetching by its goos-goarch name.
      - name: Package ACP registry archive
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp bin/contenox-${{ matrix.goos }}-${{ matrix.goarch }}.exe bin/contenox.exe
            (cd bin && zip contenox-${{ matrix.goos }}-${{ matrix.goarch }}.zip contenox.exe)
            rm bin/contenox.exe
          else
            cp bin/contenox-${{ matrix.goos }}-${{ matrix.goarch }} bin/contenox
            tar -czf bin/contenox-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz -C bin contenox
            rm bin/contenox
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contenox-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/contenox-${{ matrix.goos }}-${{ matrix.goarch }}*

  vscode:
    needs: [verify, web]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            smoke: true
          - target: linux-arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
          - target: darwin-arm64
            os: macos-15
            goos: darwin
            goarch: arm64
            smoke: true
          - target: darwin-x64
            os: macos-15-intel
            goos: darwin
            goarch: amd64
          - target: win32-x64
            os: ubuntu-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download Beam dist
        uses: actions/download-artifact@v4
        with:
          name: beam-dist
          path: runtime/internal/web/beam/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/vscode/package-lock.json

      - name: Install Linux package inspection dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y unzip file

      - name: Install extension dependencies
        working-directory: packages/vscode
        run: npm ci

      - name: Sync extension metadata
        working-directory: packages/vscode
        run: npm run sync:metadata

      - name: Verify synced metadata is committed
        run: git diff --exit-code -- packages/vscode/package.json packages/vscode/package-lock.json packages/vscode/README.md

      - name: Type-check extension
        working-directory: packages/vscode
        run: npm run check

      - name: Compile extension
        working-directory: packages/vscode
        run: npm run compile

      - name: Build target Contenox binary
        working-directory: packages/vscode
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          CONTENOX_VERSION: ${{ needs.verify.outputs.tag }}
        run: node scripts/build-binary.js

      - name: Inspect target binary
        working-directory: packages/vscode
        shell: bash
        run: |
          set -euo pipefail
          file bin/contenox*
          if [ "${{ matrix.smoke || false }}" = "true" ]; then
            ./bin/contenox --version
          fi

      - name: Package target VSIX
        working-directory: packages/vscode
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          npx vsce package \
            --target "${{ matrix.target }}" \
            --out "artifacts/contenox-runtime-${{ matrix.target }}-${{ needs.verify.outputs.extension_version }}.vsix"

      - name: Verify target VSIX contents
        working-directory: packages/vscode
        run: npm run package:check -- artifacts/*.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-${{ matrix.target }}
          path: packages/vscode/artifacts/*.vsix
          if-no-files-found: error

  release:
    needs: [verify, build, vscode]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: contenox-*
          merge-multiple: true
          path: release-assets

      - name: Download VS Code extension artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vscode-*
          merge-multiple: true
          path: release-assets

      - name: Create GitHub Release and upload assets
        run: |
          TAG="${{ needs.verify.outputs.tag }}"
          cd release-assets
          gh release create "$TAG" contenox-linux-* contenox-darwin-* contenox-windows-* contenox-runtime-*.vsix \
            --title "$TAG" \
            --notes "" \
            --latest \
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
