syntax = "proto3";

package modeld.v1;

option go_package = "github.com/contenox/runtime/modeld/transport/grpc/modeldpb";

// ModelRepo is the wire surface of the modeld daemon. It mirrors
// transport.Service (see modeld/transport); keep the two in sync.
//
// Regenerate the Go stubs with `make proto` from this directory.
service ModelRepo {
  // RegisterBackend resolves and stores one backend under the given id.
  rpc RegisterBackend(RegisterBackendRequest) returns (RegisterBackendResponse);

  // RemoveBackend removes the backend registered under the given id.
  rpc RemoveBackend(RemoveBackendRequest) returns (RemoveBackendResponse);

  // ListBackends returns the ids of all registered backends.
  rpc ListBackends(ListBackendsRequest) returns (ListBackendsResponse);

  // ListModels observes the models exposed by one backend.
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
}

message ListBackendsRequest {}

message ListBackendsResponse {
  repeated string backend_ids = 1;
}

message ListModelsRequest {
  string backend_id = 1;
}

message BackendSpec {
  string type = 1;
  string base_url = 2;
  string api_key = 3;
}

message RegisterBackendRequest {
  string backend_id = 1;
  BackendSpec spec = 2;
}

message RegisterBackendResponse {}

message RemoveBackendRequest {
  string backend_id = 1;
}

message RemoveBackendResponse {}

// ObservedModel is the wire projection of modeld.ObservedModel.
message ObservedModel {
  string name = 1;
  int32 context_length = 2;
  int64 modified_at_unix_nano = 3;
  int64 size = 4;
  string digest = 5;
  int32 max_output_tokens = 6;
  bool can_chat = 7;
  bool can_embed = 8;
  bool can_stream = 9;
  bool can_prompt = 10;
  bool can_think = 11;
  map<string, string> meta = 12;
}

message ListModelsResponse {
  repeated ObservedModel models = 1;
}
